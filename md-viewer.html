<!DOCTYPE html>
<html lang="zh-CN" data-theme="aiself">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Viewer · EarthOnline</title>
<meta name="description" content="一个单文件 Markdown 美化阅读器 — 本地文件 / URL / 剪贴板 / 手机分享打开。Built by EarthOnline.">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png?v=2">
<link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png?v=2">
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#FFFFFF">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Markdown Viewer">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500..700;1,9..144,500..700&family=Noto+Serif+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ============================================================
     THEME TOKENS — AISelf 光谱: pure-white paper, ink + serif,
     spectrum used only as small border/accent decoration.
     ============================================================ */
  :root {
    /* shared metrics */
    --r-input: 12px;
    --r-card: 14px;
    --r-pill: 999px;
    --read: 720px;
    --tb-h: 49px;
    --sh-sm: 0 1px 2px rgba(20,20,20,.08);
    --sh-raise: 0 3px 10px rgba(27,27,27,.18);
    /* brand spectrum (波长序 紫→蓝→绿→橙→红) — used by aiself accents */
    --a-purple:#8A43E6; --a-blue:#4FA8F0; --a-green:#1FA45D; --a-orange:#F4811E; --a-coral:#E8482A;
    --t-blue:#D2E9FB; --t-green:#ACE7C4; --t-orange:#FBD6A0; --t-coral:#F8C9BD;
  }

  /* ---------- AISelf 光谱 (default) ---------- */
  html, html[data-theme="aiself"] {
    --font-read: 'Songti SC','STSong','Noto Serif SC',Georgia,serif;
    --font-ui: 'PingFang SC','Noto Sans SC','Microsoft YaHei','Heiti SC',sans-serif;
    --font-mono: 'JetBrains Mono',ui-monospace,'SF Mono',Menlo,monospace;
    --font-title: 'Fraunces','Songti SC','Noto Serif SC',serif;

    --paper:#FFFFFF;
    --ink:#1B1B1B; --ink-strong:#0E0E0E; --soft:#5A5C5E; --muted:#9CA0A2;
    --rule:#ECECEB; --rule-strong:#DBDBDA;

    --toolbar-bg: rgba(255,255,255,.82);
    --title-ink:#1B1B1B; --title-hover:#4FA8F0;

    --lh-read: 1.85;
    --link:#1B1B1B; --link-underline: rgba(27,27,27,.28); --link-hover:#1B1B1B;

    --r-btn: var(--r-pill);
    --btn-bg:#FFFFFF; --btn-ink:#5A5C5E; --btn-border:#DBDBDA;
    --btn-hover-bg:#FAFAF9; --btn-hover-border:#1B1B1B; --btn-hover-ink:#1B1B1B;
    --btn-pri-bg:#1B1B1B; --btn-pri-ink:#FFFFFF; --btn-pri-hover:#000000;

    --sidebar-bg:#FAFAF9;
    --toc-ink:#5A5C5E; --toc-hover-bg:#F2F1EE; --toc-hover-ink:#1B1B1B;
    --toc-active-bg:#F2F1EE; --toc-active-ink:#1B1B1B; --toc-active-bar:#1B1B1B;
    --toc-h3-ink:#9CA0A2;

    --h1-rule:#1B1B1B; --h1-rule-w:2px;
    --hr-color:#DBDBDA;

    --code-inline-bg:#F1F0ED; --code-inline-ink:#1B1B1B;
    /* light bordered code — no dark fill block */
    --code-bg:#FBFAF7; --code-ink:#26231D; --code-border:#DBDBDA;

    /* border-led callouts: whisper bg + vivid colored left bar (no tint fill) */
    --bq-info-bg:#FCFBF9; --bq-info-bar:#4FA8F0; --bq-info-ink:#44423E; --bq-info-strong:#2F6BA8;
    --bq-warn-bg:#FCFBF9; --bq-warn-bar:#F4811E; --bq-warn-ink:#44423E; --bq-warn-strong:#8A4A0E;
    --bq-tip-bg:#FCFBF9;  --bq-tip-bar:#1FA45D;  --bq-tip-ink:#44423E;  --bq-tip-strong:#155E37;

    --table-border:#ECECEB; --row-alt:#FCFBF9; --row-hover:#F4F3F0;
    --th-bg:transparent; --th-ink:#5A5C5E; --th-rule:#1B1B1B;

    --toast-bg:#1B1B1B; --toast-ink:#FFFFFF; --toast-err:#C0492B;

    --imgbar-bg:#FBF3E2; --imgbar-border:#F0E0BD; --imgbar-ink:#6B4310;

    --drop-border:#DBDBDA; --drop-hover-bg:#FAFAF9; --drop-hover-border:#B6B1A8;
    --drop-active-bg:#F2F8FE; --drop-active-border:#4FA8F0;

    --badge-user-bg:var(--t-blue);   --badge-user-ink:#25588C;
    --badge-model-bg:var(--t-green); --badge-model-ink:#155E37;
    --badge-runtime-bg:#ECECEB;      --badge-runtime-ink:#5A5C5E;
    --badge-inject-bg:var(--t-orange); --badge-inject-ink:#8A4A0E;
    --badge-signal-bg:var(--t-coral);  --badge-signal-ink:#9E3320;
  }

  body {
    font-family: var(--font-read);
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* ===== Toolbar ===== */
  .toolbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 28px;
    background: var(--toolbar-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--rule);
    height: var(--tb-h);
  }

  .brand {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    margin-right: auto;
    min-width: 0;
  }
  .brand.is-clickable { cursor: pointer; }
  .brand-mark { height: 20px; width: auto; flex: none; display: block; }

  .toolbar h1 {
    font-family: var(--font-title);
    font-size: 15px;
    font-weight: 600;
    color: var(--title-ink);
    letter-spacing: -0.01em;
    user-select: none;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
  }
  .toolbar h1.clickable { cursor: pointer; }
  .toolbar h1.clickable:hover { color: var(--title-hover); }

  button, label.btn {
    font-family: var(--font-ui);
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 16px;
    font-size: 13px;
    font-weight: 500;
    border-radius: var(--r-btn);
    border: 1px solid var(--btn-border);
    background: var(--btn-bg);
    color: var(--btn-ink);
    cursor: pointer;
    transition: all 0.15s;
    flex: none;
  }
  button:hover, label.btn:hover {
    background: var(--btn-hover-bg);
    border-color: var(--btn-hover-border);
    color: var(--btn-hover-ink);
  }
  button.primary {
    background: var(--btn-pri-bg);
    border-color: var(--btn-pri-bg);
    color: var(--btn-pri-ink);
  }
  button.primary:hover {
    background: var(--btn-pri-hover);
    border-color: var(--btn-pri-hover);
    color: var(--btn-pri-ink);
  }

  input[type="file"] { display: none; }

  .filename {
    font-family: var(--font-ui);
    font-size: 12px;
    color: var(--muted);
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: none;
  }

  .toc-toggle { display: none; }
  .toc-toggle.visible { display: inline-flex; }

  /* ===== Toast ===== */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-12px);
    padding: 10px 24px;
    background: var(--toast-bg);
    color: var(--toast-ink);
    border-radius: var(--r-pill);
    font-family: var(--font-ui);
    font-size: 13px;
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    pointer-events: none;
    z-index: 300;
    box-shadow: var(--sh-raise);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--toast-err); }

  /* ===== Landing Page ===== */
  .landing {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - var(--tb-h));
    margin-top: var(--tb-h);
    padding: 40px 24px;
  }

  .landing-inner {
    max-width: 440px;
    width: 100%;
    text-align: center;
  }

  .landing-logo { margin-bottom: 22px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .landing-logo svg { height: 46px; width: auto; }
  .landing-logo .tagline {
    font-family: var(--font-ui);
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .drop-area {
    border: 2px dashed var(--drop-border);
    border-radius: 16px;
    padding: 56px 40px;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
  }
  .drop-area:hover {
    border-color: var(--drop-hover-border);
    background: var(--drop-hover-bg);
  }
  .drop-area.drag-over {
    border-color: var(--drop-active-border);
    background: var(--drop-active-bg);
  }
  .drop-area svg {
    width: 48px;
    height: 48px;
    margin-bottom: 16px;
    opacity: 0.32;
    stroke-width: 1;
    color: var(--soft);
  }
  .drop-area p {
    font-family: var(--font-read);
    font-size: 16px;
    color: var(--soft);
    margin-bottom: 6px;
  }
  .drop-area small {
    font-family: var(--font-ui);
    font-size: 13px;
    color: var(--muted);
  }

  .landing-divider {
    margin: 20px 0;
    font-family: var(--font-ui);
    font-size: 13px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .landing-divider::before,
  .landing-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--rule);
  }

  .url-input-group {
    display: flex;
    gap: 8px;
  }
  .url-input-group input {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid var(--rule-strong);
    border-radius: var(--r-input);
    font-family: var(--font-ui);
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
    background: var(--paper);
    color: var(--ink);
  }
  .url-input-group input::placeholder { color: var(--muted); }
  .url-input-group input:focus { border-color: var(--drop-active-border); }
  .url-input-group button {
    padding: 10px 20px;
    flex-shrink: 0;
  }

  /* landing actions: paste */
  .landing-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 14px; }
  .paste-btn { width: 100%; justify-content: center; padding: 11px 14px; }
  .paste-box { display: none; }
  .paste-box.open { display: block; margin-top: 2px; }
  .paste-box textarea {
    width: 100%;
    min-height: 120px;
    resize: vertical;
    padding: 12px 14px;
    border: 1px solid var(--rule-strong);
    border-radius: var(--r-input);
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.6;
    background: var(--paper);
    color: var(--ink);
    outline: none;
  }
  .paste-box textarea::placeholder { color: var(--muted); }
  .paste-box textarea:focus { border-color: var(--drop-active-border); }
  .paste-box .paste-actions { display: flex; justify-content: flex-end; margin-top: 8px; }

  /* one-line hint for the WeChat/Feishu → file path */
  .landing-hint {
    margin-top: 16px;
    font-family: var(--font-ui);
    font-size: 12px;
    line-height: 1.6;
    color: var(--muted);
    text-align: center;
  }

  /* footer: Built by [∞ EarthOnline logo] EarthOnline */
  .app-footer {
    margin-top: 26px;
    font-family: var(--font-ui);
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .app-footer .eo-mark { height: 13px; width: auto; flex: none; }
  .app-footer a {
    color: var(--soft);
    text-decoration: none;
    border-bottom: 1px solid var(--rule-strong);
  }
  .app-footer a:hover { color: var(--ink); }
  .reader-footer {
    max-width: var(--read);
    margin: 0 auto;
    padding: 22px 24px 40px;
    border-top: 1px solid var(--rule);
    margin-top: 8px;
  }

  /* ===== Drag Overlay (full-page, for when content is displayed) ===== */
  .drag-overlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: color-mix(in srgb, var(--paper) 92%, transparent);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .drag-overlay.active {
    opacity: 1;
    pointer-events: auto;
  }
  .drag-overlay svg {
    width: 64px;
    height: 64px;
    opacity: 0.32;
    stroke-width: 1;
    color: var(--soft);
  }
  .drag-overlay p {
    font-family: var(--font-read);
    font-size: 18px;
    color: var(--soft);
  }

  /* ===== Reader Layout ===== */
  .reader {
    margin-top: var(--tb-h);
    min-height: calc(100vh - var(--tb-h));
  }

  /* ===== Sidebar ===== */
  .sidebar {
    position: fixed;
    top: var(--tb-h);
    left: 0;
    bottom: 0;
    width: 248px;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--rule);
    overflow-y: auto;
    padding: 0;
    z-index: 50;
    transition: transform 0.25s ease;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--rule-strong); border-radius: 2px; }

  .reader.no-sidebar .sidebar { transform: translateX(-100%); }

  .sidebar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--rule);
    position: sticky;
    top: 0;
    background: var(--sidebar-bg);
    z-index: 1;
  }
  .sidebar-title {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .sidebar-close {
    width: 24px;
    height: 24px;
    border: none;
    background: none;
    color: var(--muted);
    font-size: 16px;
    cursor: pointer;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    line-height: 1;
  }
  .sidebar-close:hover { background: var(--toc-hover-bg); color: var(--soft); }

  .toc-nav {
    padding: 8px 10px 20px;
  }
  .toc-nav a {
    display: block;
    padding: 5px 12px;
    font-family: var(--font-ui);
    font-size: 13px;
    color: var(--toc-ink);
    text-decoration: none;
    border-radius: 6px;
    line-height: 1.5;
    transition: all 0.12s;
    border-left: 2px solid transparent;
  }
  .toc-nav a:hover {
    background: var(--toc-hover-bg);
    color: var(--toc-hover-ink);
  }
  .toc-nav a.active {
    background: var(--toc-active-bg);
    color: var(--toc-active-ink);
    font-weight: 600;
    border-left-color: var(--toc-active-bar);
  }
  .toc-nav a.toc-h3 {
    padding-left: 28px;
    font-size: 12px;
    color: var(--toc-h3-ink);
  }
  .toc-nav a.toc-h3.active { color: var(--toc-active-ink); }

  /* ===== Main Content Area ===== */
  .main {
    margin-left: 248px;
    transition: margin-left 0.25s ease;
  }
  .reader.no-sidebar .main { margin-left: 0; }

  .content {
    max-width: var(--read);
    margin: 0 auto;
    padding: 52px 24px 120px;
    line-height: var(--lh-read);
    color: var(--ink);
    font-size: 16.5px;
    letter-spacing: 0.01em;
  }

  /* ===== Headings ===== */
  .content h1 {
    font-family: var(--font-read);
    font-size: 34px;
    font-weight: 700;
    margin: 56px 0 24px;
    padding-bottom: 12px;
    border-bottom: var(--h1-rule-w) solid var(--h1-rule);
    color: var(--ink-strong);
    letter-spacing: -0.02em;
    line-height: 1.25;
  }
  .content h1:first-child { margin-top: 0; }

  .content h2 {
    font-family: var(--font-read);
    font-size: 22px;
    font-weight: 700;
    margin: 44px 0 14px;
    color: var(--ink);
    letter-spacing: -0.01em;
    line-height: 1.35;
  }
  /* small spectrum dot, color rotates per section (色作点缀) */
  html[data-theme="aiself"] .content h2 {
    display: flex;
    align-items: baseline;
    gap: 11px;
  }
  html[data-theme="aiself"] .content h2::before {
    content: "";
    flex: none;
    width: 9px;
    height: 9px;
    border-radius: 3px;
    transform: translateY(-1px);
    background: var(--a-purple);
  }
  html[data-theme="aiself"] .content h2:nth-of-type(5n+1)::before { background: var(--a-purple); }
  html[data-theme="aiself"] .content h2:nth-of-type(5n+2)::before { background: var(--a-blue); }
  html[data-theme="aiself"] .content h2:nth-of-type(5n+3)::before { background: var(--a-green); }
  html[data-theme="aiself"] .content h2:nth-of-type(5n+4)::before { background: var(--a-orange); }
  html[data-theme="aiself"] .content h2:nth-of-type(5n+5)::before { background: var(--a-coral); }

  .content h3 {
    font-family: var(--font-read);
    font-size: 18px;
    font-weight: 600;
    margin: 32px 0 10px;
    color: var(--ink);
    line-height: 1.4;
  }

  .content h4 {
    font-family: var(--font-read);
    font-size: 16px;
    font-weight: 600;
    margin: 24px 0 8px;
    color: var(--soft);
  }

  /* ===== Paragraphs ===== */
  .content p {
    margin: 0 0 16px;
    text-align: justify;
    word-break: break-word;
  }

  /* ===== Links ===== */
  .content a {
    color: var(--link);
    text-decoration: none;
    border-bottom: 1px solid var(--link-underline);
    transition: border-color 0.15s, color 0.15s;
  }
  .content a:hover { border-bottom-color: var(--link-hover); color: var(--link-hover); }

  /* ===== Lists ===== */
  .content ul, .content ol {
    margin: 0 0 16px;
    padding-left: 1.8em;
  }
  .content li {
    margin: 5px 0;
    line-height: 1.75;
  }
  .content li > ul, .content li > ol { margin: 4px 0 4px; }
  .content li::marker { color: var(--muted); }

  /* ===== Blockquote — info (default) ===== */
  .content blockquote {
    margin: 20px 0;
    padding: 14px 20px;
    border-left: 4px solid var(--bq-info-bar);
    background: var(--bq-info-bg);
    color: var(--bq-info-ink);
    font-style: normal;
    border-radius: 0 8px 8px 0;
  }
  .content blockquote p:last-child { margin-bottom: 0; }
  .content blockquote strong { color: var(--bq-info-strong); }
  /* aiself: crisp hairline card with a vivid colored left edge (用边框, not a tint fill) */
  html[data-theme="aiself"] .content blockquote {
    border-top: 1px solid var(--rule);
    border-right: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    border-radius: 0 8px 8px 0;
  }

  .content blockquote.bq-warn {
    border-left-color: var(--bq-warn-bar);
    background: var(--bq-warn-bg);
    color: var(--bq-warn-ink);
  }
  .content blockquote.bq-warn strong { color: var(--bq-warn-strong); }

  .content blockquote.bq-tip {
    border-left-color: var(--bq-tip-bar);
    background: var(--bq-tip-bg);
    color: var(--bq-tip-ink);
  }
  .content blockquote.bq-tip strong { color: var(--bq-tip-strong); }

  /* ===== Inline code ===== */
  .content code {
    font-family: var(--font-mono);
    font-size: 0.85em;
    padding: 0.15em 0.45em;
    background: var(--code-inline-bg);
    border-radius: 4px;
    color: var(--code-inline-ink);
    white-space: nowrap;
  }

  /* ===== Code block ===== */
  .content pre {
    margin: 20px 0;
    padding: 16px 20px;
    background: var(--code-bg);
    border: 1px solid var(--code-border);
    border-radius: var(--r-card);
    overflow-x: auto;
    box-shadow: var(--sh-sm);
  }
  .content pre code {
    padding: 0;
    background: none;
    color: var(--code-ink);
    font-size: 13px;
    line-height: 1.6;
    white-space: pre;
  }

  /* ===== Table ===== */
  .content table {
    width: 100%;
    margin: 20px 0;
    border-collapse: collapse;
    font-size: 14px;
    line-height: 1.55;
    border: 1px solid var(--table-border);
    border-radius: 8px;
    overflow: hidden;
  }
  .content th {
    background: var(--th-bg);
    color: var(--th-ink);
    font-weight: 600;
    padding: 9px 12px;
    text-align: left;
    font-size: 13px;
    letter-spacing: 0.02em;
    border-bottom: 2px solid var(--th-rule);
  }
  html[data-theme="aiself"] .content th {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .content td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--table-border);
    vertical-align: top;
  }
  .content tbody tr:nth-child(even) { background: var(--row-alt); }
  .content tbody tr:hover { background: var(--row-hover); }

  /* ===== Misc ===== */
  .content hr {
    margin: 36px auto;
    border: none;
    width: 80px;
    height: 1px;
    background: var(--hr-color);
  }
  /* aiself: a small rainbow divider (善用彩虹) */
  html[data-theme="aiself"] .content hr {
    width: 120px;
    height: 3px;
    border-radius: 3px;
    background: linear-gradient(90deg,#8A43E6,#4FA8F0 25%,#1FA45D 50%,#F4811E 75%,#E8482A);
  }

  .content img {
    max-width: 100%;
    border-radius: 8px;
    margin: 16px 0;
    box-shadow: 0 2px 16px rgba(0,0,0,0.06);
  }

  .content strong { color: var(--ink-strong); font-weight: 700; }
  .content em { color: var(--soft); font-style: italic; }

  .content input[type="checkbox"] {
    margin-right: 8px;
    accent-color: var(--ink);
  }

  /* ===== Semantic color badges ===== */
  .badge {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 4px;
    font-size: 0.85em;
    font-weight: 500;
    font-family: var(--font-mono);
    white-space: nowrap;
  }
  .sc-user    { background: var(--badge-user-bg);    color: var(--badge-user-ink); }
  .sc-model   { background: var(--badge-model-bg);   color: var(--badge-model-ink); }
  .sc-runtime { background: var(--badge-runtime-bg); color: var(--badge-runtime-ink); }
  .sc-inject  { background: var(--badge-inject-bg);  color: var(--badge-inject-ink); }
  .sc-signal  { background: var(--badge-signal-bg);  color: var(--badge-signal-ink); font-weight: 600; }

  /* aiself: outline badges — vivid spectrum borders + readable dark text, no fill block (用边框, 善用彩虹) */
  html[data-theme="aiself"] .badge { background: var(--paper); border: 1.5px solid var(--rule-strong); }
  html[data-theme="aiself"] .sc-user    { color:#25588C; border-color:var(--a-blue); }
  html[data-theme="aiself"] .sc-model   { color:#155E37; border-color:var(--a-green); }
  html[data-theme="aiself"] .sc-runtime { color:#5A5C5E; border-color:var(--rule-strong); }
  html[data-theme="aiself"] .sc-inject  { color:#8A4A0E; border-color:var(--a-orange); }
  html[data-theme="aiself"] .sc-signal  { color:#9E3320; border-color:var(--a-coral); }

  /* ===== Image path bar ===== */
  .img-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 28px;
    background: var(--imgbar-bg);
    border-bottom: 1px solid var(--imgbar-border);
    font-family: var(--font-ui);
    font-size: 13px;
    color: var(--imgbar-ink);
    position: fixed;
    top: var(--tb-h);
    left: 0;
    right: 0;
    z-index: 90;
  }
  .img-bar input[type="text"] {
    flex: 1;
    padding: 5px 10px;
    border: 1px solid var(--rule-strong);
    border-radius: 6px;
    font-size: 13px;
    font-family: var(--font-mono);
    background: var(--paper);
    color: var(--ink);
  }
  .img-bar button {
    padding: 5px 14px;
    font-size: 13px;
    border-radius: 6px;
    border: 1px solid var(--rule-strong);
    background: var(--paper);
    cursor: pointer;
  }

  /* ===== Print ===== */
  @page {
    size: A4;
    margin: 15mm 15mm 15mm 25mm;
  }

  @media print {
    * {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
      color-adjust: exact !important;
    }

    .toolbar, .sidebar, .drag-overlay, .img-bar, .app-footer { display: none !important; }
    body { background: #fff; }

    .main { margin-left: 0 !important; }

    .content {
      max-width: 100%;
      padding: 0;
      font-size: 13px;
      line-height: 1.6;
      color: #1a1a1a;
    }

    .content h1 {
      font-size: 20px;
      margin: 24px 0 8px;
      padding-bottom: 5px;
    }
    .content h1:first-child { margin-top: 0; }

    .content h2 {
      font-size: 16px;
      margin: 20px 0 6px;
      padding: 4px 0 4px 10px;
      page-break-after: avoid;
    }

    .content h3 {
      font-size: 14px;
      margin: 14px 0 5px;
      page-break-after: avoid;
    }

    .content h4 {
      font-size: 13px;
      margin: 10px 0 4px;
      page-break-after: avoid;
    }

    .content p { margin: 0 0 8px; }
    .content ul, .content ol { margin: 0 0 8px; }
    .content li { margin: 2px 0; line-height: 1.5; }

    .content blockquote {
      margin: 10px 0;
      padding: 8px 14px;
      page-break-inside: avoid;
    }

    /* keep code blocks light & clean for print */
    .content pre {
      margin: 10px 0;
      padding: 8px 12px;
      page-break-inside: avoid;
      background: #f6f6f4 !important;
      border: 1px solid #e2e4e8 !important;
      box-shadow: none !important;
    }
    .content pre code { font-size: 11px; line-height: 1.45; color: #1a1a1a !important; }

    .content table {
      margin: 10px 0;
      font-size: 11.5px;
    }
    .content tr { page-break-inside: avoid; }
    /* keep table headers light for print */
    .content th {
      padding: 5px 8px;
      font-size: 11px;
      background: #f0f0f0 !important;
      color: #1a1a1a !important;
      border-bottom: 1px solid #d0d0d0 !important;
    }
    .content td { padding: 4px 8px; }

    .content hr { margin: 14px auto; }

    .content img {
      max-height: 250px;
      box-shadow: none;
      page-break-inside: avoid;
    }

    .content code { font-size: 0.82em; padding: 0.1em 0.35em; }
  }

  /* ===== Responsive ===== */
  @media (max-width: 1024px) {
    .sidebar { transform: translateX(-100%); }
    .sidebar.mobile-open { transform: translateX(0); }
    .main { margin-left: 0 !important; }
    .reader.no-sidebar .sidebar { transform: translateX(-100%); }
  }

  @media (max-width: 640px) {
    .toolbar { padding: 10px 14px; gap: 8px; }
    .filename { display: none; }
    /* icon-only actions to fit narrow toolbars */
    .btn-label { display: none; }
    .toolbar label.btn, .toolbar > button { padding: 7px 10px; }
    /* keep the MD mark as logo; hide the wordmark to make room */
    .toolbar h1 { display: none; }
    .content { padding: 36px 18px 90px; }
  }
</style>
</head>

<script>
const $ = id => document.getElementById(id);

const output     = $('output');
const landing    = $('landing');
const reader     = $('reader');
const sidebar    = $('sidebar');
const tocNav     = $('tocNav');
const tocToggle  = $('tocToggle');
const copyBtn    = $('copyBtn');
const filenameEl = $('filename');
const titleBtn   = $('titleBtn');
const brand      = $('brand');
const toast      = $('toast');
const fileInput  = $('fileInput');
const dropArea   = $('dropArea');
const dragOverlay = $('dragOverlay');
const urlInput   = $('urlInput');
const imgBar     = $('imgBar');
const imgPathInput = $('imgPathInput');
const pasteBtn       = $('pasteBtn');
const pasteBox       = $('pasteBox');
const pasteArea      = $('pasteArea');
const pasteRenderBtn = $('pasteRenderBtn');

marked.setOptions({ gfm: true, breaks: true });

// ===== Semantic color map =====
const SEMANTIC = {
  'user':'sc-user','tool_result':'sc-user',
  'assistant':'sc-model','thinking':'sc-model','text':'sc-model','tool_use':'sc-model',
  'runtime':'sc-runtime','system':'sc-runtime','mixed':'sc-runtime',
  'queue-operation':'sc-runtime','last-prompt':'sc-runtime','ai-title':'sc-runtime',
  'file-history-snapshot':'sc-runtime',
  'attachment':'sc-inject','deferred_tools_delta':'sc-inject','skill_listing':'sc-inject',
  'todo_reminder':'sc-inject','hook_success':'sc-inject','command_permissions':'sc-inject',
  'compact_file_reference':'sc-inject','invoked_skills':'sc-inject',
  'stop_reason':'sc-signal','end_turn':'sc-signal','stop_hook_summary':'sc-signal',
};

function semanticClass(text) {
  return SEMANTIC[text.toLowerCase().replace(/\(.*\)/,'').trim()] || null;
}

// ===== Toast =====
let toastTimer;
function showToast(msg, isError) {
  clearTimeout(toastTimer);
  toast.textContent = msg;
  toast.className = 'toast show' + (isError ? ' error' : '');
  toastTimer = setTimeout(() => { toast.className = 'toast'; }, 2400);
}

// ===== Post-processing =====
function postProcess() {
  output.querySelectorAll('code').forEach(el => {
    if (el.parentElement.tagName === 'PRE') return;
    const cls = semanticClass(el.textContent);
    if (cls) el.classList.add(cls);
  });

  output.querySelectorAll('td').forEach(td => {
    const cls = semanticClass(td.textContent.trim());
    if (cls) td.innerHTML = '<span class="badge ' + cls + '">' + td.innerHTML + '</span>';
  });

  output.querySelectorAll('blockquote').forEach(bq => {
    const t = bq.textContent.trim();
    if (/^[⚠️⚠]/.test(t))        bq.classList.add('bq-warn');
    else if (/^[💡✅✓☑]/.test(t)) bq.classList.add('bq-tip');
  });
}

// ===== TOC & Sidebar =====
let scrollHandler = null;

function generateTOC() {
  if (scrollHandler) {
    window.removeEventListener('scroll', scrollHandler);
    scrollHandler = null;
  }

  const headings = output.querySelectorAll('h2, h3');

  if (headings.length < 3) {
    reader.classList.add('no-sidebar');
    tocToggle.classList.remove('visible');
    tocNav.innerHTML = '';
    return;
  }

  reader.classList.remove('no-sidebar');
  tocToggle.classList.add('visible');

  let html = '';
  headings.forEach((h, i) => {
    const id = 'sec-' + i;
    h.id = id;
    const cls = h.tagName === 'H3' ? ' toc-h3' : '';
    html += '<a href="#' + id + '" class="' + cls + '">' + h.textContent + '</a>';
  });
  tocNav.innerHTML = html;

  // Scroll spy
  const links = tocNav.querySelectorAll('a');
  scrollHandler = function() {
    const scrollY = window.scrollY + 80;
    let current = '';
    headings.forEach(h => { if (h.offsetTop <= scrollY) current = h.id; });
    links.forEach(a => a.classList.toggle('active', a.getAttribute('href') === '#' + current));
  };
  window.addEventListener('scroll', scrollHandler, { passive: true });
  scrollHandler();
}

// TOC click → smooth scroll
tocNav.addEventListener('click', e => {
  const link = e.target.closest('a');
  if (!link) return;
  e.preventDefault();
  const el = document.getElementById(link.getAttribute('href').slice(1));
  if (el) window.scrollTo({ top: el.offsetTop - 60, behavior: 'smooth' });
  // Close sidebar on mobile after click
  if (window.innerWidth <= 1024) sidebar.classList.remove('mobile-open');
});

function toggleSidebar() {
  if (window.innerWidth <= 1024) {
    sidebar.classList.toggle('mobile-open');
  } else {
    reader.classList.toggle('no-sidebar');
  }
}

tocToggle.addEventListener('click', toggleSidebar);
$('sidebarClose').addEventListener('click', toggleSidebar);

// ===== Core Render =====
function renderMd(text, name) {
  output.innerHTML = marked.parse(text);
  postProcess();
  generateTOC();

  landing.style.display = 'none';
  reader.style.display = '';
  copyBtn.style.display = '';
  filenameEl.textContent = name || '';
  titleBtn.classList.add('clickable');
  brand.classList.add('is-clickable');
  document.title = name ? name.replace(/\.\w+$/, '') : 'Markdown Viewer';

  checkImages();
  window.scrollTo({ top: 0 });
}

function showLanding() {
  reader.style.display = 'none';
  landing.style.display = '';
  copyBtn.style.display = 'none';
  tocToggle.classList.remove('visible');
  filenameEl.textContent = '';
  titleBtn.classList.remove('clickable');
  brand.classList.remove('is-clickable');
  document.title = 'Markdown Viewer';
  imgBar.style.display = 'none';

  // Clean URL params
  if (window.location.search) history.replaceState({}, '', window.location.pathname);
}

// Brand (∞ mark + title) click → back to landing
brand.addEventListener('click', () => {
  if (titleBtn.classList.contains('clickable')) showLanding();
});

// ===== URL Loading =====
function isLocalPath(str) {
  return /^(\/|~\/|[A-Z]:\\)/i.test(str);
}

const isLocalServer = ['127.0.0.1', 'localhost'].includes(window.location.hostname);

function normalizeGitHubUrl(url) {
  const m = url.match(/^https?:\/\/github\.com\/([^/]+)\/([^/]+)\/blob\/(.+)$/);
  if (m) return 'https://raw.githubusercontent.com/' + m[1] + '/' + m[2] + '/' + m[3];
  return url;
}

function extractFilename(str) {
  return str.split('/').pop() || str;
}

const LOCAL_API = 'http://127.0.0.1:9274';

function handleInput(val) {
  val = val.trim();
  if (!val) return;
  if (isLocalPath(val)) {
    loadLocalFile(val);
    return;
  }
  loadFromUrl(val);
}

async function loadLocalFile(path) {
  const apiBase = isLocalServer ? '' : LOCAL_API;

  if (!isLocalServer) {
    showToast('本地文件需通过 mdview 命令打开', true);
    return;
  }

  showToast('加载中…');
  try {
    const res = await fetch(apiBase + '/api/read?path=' + encodeURIComponent(path));
    if (!res.ok) throw new Error('文件未找到');
    const text = await res.text();
    renderMd(text, extractFilename(path));

    try {
      const u = new URL(window.location);
      u.searchParams.set('file', path);
      history.replaceState({}, '', u);
    } catch (_) {}
  } catch (err) {
    showToast('加载失败: ' + err.message, true);
  }
}

async function loadFromUrl(url) {
  url = normalizeGitHubUrl(url.trim());
  showToast('加载中…');

  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    renderMd(text, extractFilename(url));

    const u = new URL(window.location);
    u.searchParams.set('url', url);
    history.replaceState({}, '', u);
  } catch (err) {
    showToast('加载失败: ' + err.message, true);
  }
}

$('urlLoadBtn').addEventListener('click', () => handleInput(urlInput.value));

urlInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') handleInput(urlInput.value);
});

// ===== Paste: try clipboard silently, else open a textarea to paste into =====
pasteBtn.addEventListener('click', async () => {
  if (navigator.clipboard && navigator.clipboard.readText) {
    try {
      const text = await navigator.clipboard.readText();
      if (text && text.trim()) { renderMd(text, '剪贴板内容'); return; }
    } catch (_) { /* blocked → fall through to manual paste */ }
  }
  pasteBox.classList.add('open');
  pasteArea.focus();
});

pasteRenderBtn.addEventListener('click', () => {
  const t = pasteArea.value;
  if (t && t.trim()) renderMd(t, '粘贴内容');
  else showToast('请先粘贴 Markdown 文本', true);
});

// ===== File Handling =====
function handleFile(file) {
  if (!file) return;
  const r = new FileReader();
  r.onload = e => renderMd(e.target.result, file.name);
  r.readAsText(file);
}

fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

// Drop area click → open file picker
dropArea.addEventListener('click', () => fileInput.click());

// ===== Drag & Drop =====
let dragCounter = 0;

document.addEventListener('dragover', e => e.preventDefault());

document.addEventListener('dragenter', e => {
  e.preventDefault();
  dragCounter++;
  if (reader.style.display !== 'none') {
    dragOverlay.classList.add('active');
  } else {
    dropArea.classList.add('drag-over');
  }
});

document.addEventListener('dragleave', () => {
  dragCounter--;
  if (dragCounter <= 0) {
    dragCounter = 0;
    dragOverlay.classList.remove('active');
    dropArea.classList.remove('drag-over');
  }
});

document.addEventListener('drop', e => {
  e.preventDefault();
  dragCounter = 0;
  dragOverlay.classList.remove('active');
  dropArea.classList.remove('drag-over');

  const items = e.dataTransfer.items;
  if (items && items.length > 0 && items[0].webkitGetAsEntry) {
    const entry = items[0].webkitGetAsEntry();
    if (entry && entry.isFile) {
      entry.file(file => {
        const r = new FileReader();
        r.onload = ev => {
          renderMd(ev.target.result, file.name);
          if (entry.getParent) {
            entry.getParent(dir => resolveImagesFromDir(dir), () => checkImages());
          } else {
            checkImages();
          }
        };
        r.readAsText(file);
      });
      return;
    }
  }
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
});

function resolveImagesFromDir(dirEntry) {
  const dirReader = dirEntry.createReader();
  const allEntries = [];
  function readAll() {
    dirReader.readEntries(entries => {
      if (entries.length === 0) {
        const fileMap = {};
        allEntries.forEach(e => { if (e.isFile) fileMap[e.name] = e; });
        output.querySelectorAll('img').forEach(img => {
          const src = img.getAttribute('src');
          if (src && !src.startsWith('http') && !src.startsWith('data:') && !src.startsWith('file://') && fileMap[src]) {
            fileMap[src].file(f => { img.src = URL.createObjectURL(f); });
          }
        });
        return;
      }
      allEntries.push(...entries);
      readAll();
    });
  }
  readAll();
}

// ===== Copy =====
copyBtn.addEventListener('click', () => {
  const html = output.innerHTML;
  navigator.clipboard.write([
    new ClipboardItem({
      'text/html': new Blob([html], { type: 'text/html' }),
      'text/plain': new Blob([output.innerText], { type: 'text/plain' }),
    })
  ]).then(() => showToast('已复制到剪贴板'));
});

// ===== Paste markdown =====
document.addEventListener('paste', e => {
  const tag = document.activeElement && document.activeElement.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  if (reader.style.display !== 'none') return;
  const text = e.clipboardData.getData('text');
  if (text && text.length > 10) renderMd(text, '粘贴内容');
});

// ===== Image path handling =====
$('imgPathBtn').addEventListener('click', applyImgPath);

function applyImgPath() {
  let base = imgPathInput.value.trim();
  if (!base) return;
  if (!base.endsWith('/')) base += '/';
  const prefix = base.startsWith('file://') ? base : 'file://' + base;
  output.querySelectorAll('img').forEach(img => {
    const src = img.getAttribute('src');
    if (src && !src.startsWith('http') && !src.startsWith('file://') && !src.startsWith('data:')) {
      img.src = prefix + src;
    }
  });
  try { localStorage.setItem('md_imgpath', base); } catch(e) {}
  imgBar.style.display = 'none';
}

function checkImages() {
  let hasRelative = false;
  output.querySelectorAll('img').forEach(img => {
    const src = img.getAttribute('src');
    if (src && !src.startsWith('http') && !src.startsWith('file://') && !src.startsWith('data:')) {
      hasRelative = true;
    }
  });
  if (hasRelative) {
    const saved = localStorage.getItem('md_imgpath');
    if (saved) {
      imgPathInput.value = saved;
      applyImgPath();
    } else {
      imgBar.style.display = '';
    }
  }
}

// ===== Web Share Target — read what the SW stashed from a shared file/text/url =====
async function consumeShared() {
  try {
    const cache = await caches.open('md-shared');
    const res = await cache.match('/__shared__');
    if (!res) return false;
    const data = await res.json();
    await cache.delete('/__shared__');
    if (data && data.text && data.text.trim()) { renderMd(data.text, data.name || '分享内容'); return true; }
    if (data && data.url) { loadFromUrl(data.url); return true; }
  } catch (_) {}
  return false;
}

// ===== Init =====
(function init() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('from') === 'share') {
    consumeShared().then(handled => {
      history.replaceState({}, '', window.location.pathname);
      if (!handled) showToast('没有收到分享内容', true);
    });
    return;
  }
  const file = params.get('file');
  const url = params.get('url');
  const text = params.get('text');
  if (file) loadLocalFile(file);
  else if (url) loadFromUrl(url);
  else if (text && text.trim()) renderMd(text, '分享内容');
})();

// ===== PWA: register service worker + handle "open with" file launches =====
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
if ('launchQueue' in window) {
  try {
    window.launchQueue.setConsumer(async (lp) => {
      if (lp && lp.files && lp.files.length) {
        try {
          const f = await lp.files[0].getFile();
          const txt = await f.text();
          renderMd(txt, f.name || '文件');
        } catch (_) {}
      }
    });
  } catch (_) {}
}
</script>
